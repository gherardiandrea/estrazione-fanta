name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide clear reproduction steps.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Environment details
      placeholder: PHP, Node, OS, browser
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
