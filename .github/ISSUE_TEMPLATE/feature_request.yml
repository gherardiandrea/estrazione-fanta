name: Feature request
description: Suggest an idea to improve the project
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your suggested implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
